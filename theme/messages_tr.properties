# OAuth token endpoint and callback errors
[TokenExchangeFailed]=Giriş denemeniz tamamlanırken beklenmeyen bir hata oluştu. Lütfen isteği tekrar deneyin.
[TokenExchangeException]=Giriş denemeniz tamamlanamadı. Lütfen isteği tekrar deneyin.

# Webhook transaction failure
[WebhookTransactionException]=Bir veya daha fazla webhook geçersiz bir yanıt döndürdü veya erişilemez durumda. İşlem yapılandırmanıza göre işleminiz tamamlanamıyor.

# Self-service
[SelfServiceCustomValidationException]=Genişletilmiş doğrulama başarısız oldu. Self-servis kayıt tamamlanamıyor.
[SelfServiceFormNotConfigured]=Yapılandırma eksiktir. Yöneticinin bu uygulama için bir form yapılandırması gerekmektedir.
[SelfServiceUserNotRegisteredException]=Bu uygulama için kayıtlı değilsiniz. Tüm özellikler kullanılamayacaktır.
[TwoFactorAuthenticationMethodDisabled]=İki faktörlü kimlik doğrulama devre dışı bırakıldı
[TwoFactorAuthenticationMethodEnabled]=İki faktörlü kimlik doğrulama etkinleştirildi
[TwoFactorSendFailed]=İki faktörlü yapılandırma için tek kullanımlık kod gönderme isteği başarısız oldu.
[TwoFactorMessageSent]=Tek kullanımlık kod gönderildi

# General messages
[UserWillBeLoggedIn]=Bu isteği tamamladıktan sonra giriş yapacaksınız.

[TrustTokenExpired]=Güven süreniz doldu, lütfen tekrar deneyin.
[TrustTokenRequired]=Güven belirteci gerekli. Lütfen destek ile iletişime geçin.
[TrustTokenRequiredToChangePassword]=Parolanızı değiştirmeden önce lütfen bu doğrulamayı tamamlayın.


[InvalidOrMissingCSRFToken]=Bu isteği yapmaya yetkiniz bulunmamaktadır. Bu formu bir tarayıcıda doldurduğunuzdan emin olun.
[RateLimitedException]=İsteğiniz hız sınırına ulaştı. Lütfen başka bir istek yapmadan önce birkaç dakika bekleyin.

[MessengerError]=Mesaj gönderilirken bir hata oluştu. Lütfen sistem yöneticinizle iletişime geçin.

