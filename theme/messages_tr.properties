#
# Multi-factor configuration descriptions
#
{description}two-factor-authentication=İki faktörlü kimlik doğrulama, giriş yapmak için yalnızca paroladan daha fazlasını gerektirerek hesabınıza ek bir güvenlik katmanı ekler. Giriş sırasında kullanmak üzere bir veya daha fazla yöntem yapılandırın.
{description}two-factor-methods-selection=Girişi tamamlamak için ikinci bir adım gereklidir. Girişi tamamlamak için aşağıdaki yöntemlerden birini seçin.
{description}two-factor-recovery-code-note=Doğrulama kodu almak için cihaza veya uygulamaya artık erişiminiz yoksa, bu iki faktörlü yöntemi devre dışı bırakmak için bir kurtarma kodu kullanabilirsiniz. Uyarı: Herhangi bir iki faktörlü yöntemi devre dışı bırakmak için kurtarma kodu kullandığınızda, tüm iki faktörlü yöntemler kaldırılacak ve tüm kurtarma kodlarınız silinecektir.
{description}recovery-codes-1=İki faktörlü doğrulamayı ilk kez etkinleştirdiğiniz için size %d kurtarma kodu oluşturduk. Bu kodlar tekrar gösterilmeyecektir, bu yüzden şimdi kaydedin ve güvenli bir yerde saklayın. Bu kodlar, cihazınızı kaybetmeniz durumunda iki faktörlü girişi tamamlamak için kullanılabilir ve ayrıca iki faktörlü kimlik doğrulamayı devre dışı bırakmak için de kullanılabilir.
{description}recovery-codes-2=Kodları kaydettiğinizde, iki faktörlü yönetime dönmek için Tamam düğmesine tıklayın.
{description}oauth2-recovery-codes-1=Bu kurtarma kodlarını kaydedin, tekrar gösterilmeyecektir. Kurtarma kodları, cihazınızı kaybetmeniz durumunda iki faktörlü girişi tamamlamak veya iki faktörlü kimlik doğrulamayı devre dışı bırakmak için kullanılabilir.
{description}oauth2-recovery-codes-2=Kodları kaydettiğinizde, devam etmek için Tamam düğmesine tıklayın.

{description}email-verification-required-change-email=E-posta adresinizin doğru olduğunu kontrol edin ve kayıt sırasında yanlış yazdıysanız güncelleyin. Adresinizi güncellemek, yeni adrese de yeni bir e-posta gönderecektir.
{description}email-verification-required=Devam etmeden önce e-posta adresinizi doğrulamanız gerekmektedir.
{description}email-verification-required-non-interactive=E-posta doğrulaması bu istek dışında tamamlanacak şekilde yapılandırılmıştır. E-postanızı doğruladıktan sonra bu isteği tekrar deneyin.
{description}email-verification-required-non-interactive-registration=Kayıt için e-posta doğrulaması gereklidir. Doğrulama e-postası için gelen kutunuzu kontrol edin ve talimatları izleyin.

{description}passwordless-login-form-field=Devam etmeden önce mesajınızdaki kodu girmeniz gerekmektedir.

{description}phone-verification-required-change-phone=Telefon numaranızın doğru olduğunu kontrol edin ve kayıt sırasında yanlış yazdıysanız güncelleyin. Telefon numaranızı güncellemek, yeni numaraya da yeni bir mesaj gönderecektir.
